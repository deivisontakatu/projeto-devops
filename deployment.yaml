apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops

  template:
    metadata:
      labels:
        app: devops

    spec:
      containers:
      - name: app
        image: deivisontakatu/devops-app:latest
        ports:
        - containerPort: 3000